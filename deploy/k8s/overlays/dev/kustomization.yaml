apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: base-dev

resources:
  - namespace.yaml
  - ../../base

images:
  - name: base/svc/user
    newTag: dev
  - name: base/apps/webapp/api
    newTag: dev
  - name: base/apps/webapp/web
    newTag: dev

# Dev-only patches: relax cookie secure flag for HTTP ingress.
patches:
  - target:
      kind: ConfigMap
      name: webapp-bff-config
    patch: |-
      - op: replace
        path: /data/BASE_WEBAPP_COOKIE_SECURE
        value: "false"
      - op: replace
        path: /data/BASE_WEBAPP_COOKIE_DOMAIN
        value: "localhost"
