apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  labels:
    app.kubernetes.io/name: user
    app.kubernetes.io/component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user
        app.kubernetes.io/component: service
    spec:
      containers:
        - name: user
          image: base/svc/user:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: user-config
            - secretRef:
                name: user-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: user
spec:
  selector:
    app.kubernetes.io/name: user
  ports:
    - name: http
      port: 80
      targetPort: 8001
