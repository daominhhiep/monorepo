apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-bff
  labels:
    app.kubernetes.io/name: webapp-bff
    app.kubernetes.io/component: bff
    app.kubernetes.io/part-of: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp-bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webapp-bff
        app.kubernetes.io/component: bff
        app.kubernetes.io/part-of: webapp
    spec:
      containers:
        - name: webapp-bff
          image: base/apps/webapp/api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: webapp-bff-config
            - secretRef:
                name: webapp-bff-secret
          readinessProbe:
            httpGet: { path: /readyz, port: http }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-bff
spec:
  selector:
    app.kubernetes.io/name: webapp-bff
  ports:
    - name: http
      port: 80
      targetPort: 8082
