apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-web
  labels:
    app.kubernetes.io/name: webapp-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webapp-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: webapp
    spec:
      containers:
        - name: web
          image: base/apps/webapp/web:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: http }
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-web
spec:
  selector:
    app.kubernetes.io/name: webapp-web
  ports:
    - name: http
      port: 80
      targetPort: 80
