version: v2
managed:
  enabled: true
plugins:
  - local:
      - pnpm
      - exec
      - protoc-gen-es
    out: src/gen
    opt:
      - target=ts
      - import_extension=js
inputs:
  - directory: ../../../proto
    paths:
      - ../../../proto/apps/webapp/v1/api.proto
  - module: buf.build/bufbuild/protovalidate
