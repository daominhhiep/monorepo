name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io/daominhhiep/monorepo

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            services/user/go.sum
            apps/webapp/go.sum
            pkg/auth/go.sum
      - run: cd services/user && go test ./...
      - run: cd apps/webapp && go test ./...
      - run: cd pkg/auth && go test ./...

  build-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build & push multi-arch images
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.tag }}
          COMMIT: ${{ github.sha }}
        run: |
          docker buildx bake --push \
            --set "*.platform=linux/amd64,linux/arm64"

  bump-dev-tag:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: imranismail/setup-kustomize@v2
      - name: Update image tags in overlays/dev
        env:
          TAG: ${{ needs.build-push.outputs.tag }}
        run: |
          cd deploy/k8s/overlays/dev
          kustomize edit set image \
            "base/svc/user=${REGISTRY}/svc/user:${TAG}" \
            "base/apps/webapp/api=${REGISTRY}/apps/webapp/api:${TAG}" \
            "base/apps/webapp/web=${REGISTRY}/apps/webapp/web:${TAG}"
      - name: Commit & push
        env:
          TAG: ${{ needs.build-push.outputs.tag }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deploy/k8s/overlays/dev/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No image tag changes."
          else
            git commit -m "chore(dev): bump images to ${TAG} [skip ci]"
            git push
          fi
